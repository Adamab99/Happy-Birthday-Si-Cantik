<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Fiancee ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
    text-align:center;
}

.container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    font-size:15px;
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    width:80%;
    max-width:220px;
    text-align:center;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    cursor:pointer;
    font-size:15px;
}

.hidden{
    display:none;
}

.dots{
    position:relative;
    width:100%;
    height:100vh;
}

.dot{
    width:26px;
    height:26px;
    background:white;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    box-shadow:0 0 15px white;
}

.message{
    position:absolute;
    bottom:60px;
    width:90%;
    left:5%;
    font-size:18px;
    line-height:1.5;
}

@media(max-width:600px){

    h1{
        font-size:24px;
    }

    .message{
        font-size:16px;
        bottom:40px;
    }

    .dot{
        width:22px;
        height:22px;
    }

}

    .lines{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

.lines line{
    stroke:white;
    stroke-width:2;
    opacity:0.4;
}
    
</style>
</head>

<body>

<div class="container" id="login">
    <h1>For My Fiancee ❤️</h1>
    <p>Hint:Your Birthday</p>

    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Unlock My Heart</button>
</div>

<div class="hidden" id="main">

    <div class="dots">

<svg class="lines">

<line x1="20%" y1="20%" x2="70%" y2="35%" />
<line x1="70%" y1="35%" x2="30%" y2="60%" />
<line x1="30%" y1="60%" x2="65%" y2="68%" />

</svg>

        <div class="dot" style="top:20%; left:20%;" onclick="showMessage('Terima kasih sebab hadir dalam hidupku ❤️')"></div>

        <div class="dot" style="top:35%; left:70%;" onclick="showMessage('Terima kasih sebab terima ku seadanya ✨')"></div>

        <div class="dot" style="top:60%; left:30%;" onclick="showMessage('Terima kasih sebab kekal bertahan selama ini dengan ku ❤️')"></div>

        <div class="dot" style="top:75%; left:75%;" onclick="showMessage('Semoga masjid yang bakal kita bina ini dipermudahkan segalanya 💍')"></div>

        <div class="message" id="message">
            Tap the glowing dots slowly ❤️
        </div>

    </div>

</div>

<script>

function checkPassword(){

    const password = document.getElementById("password").value;

    if(password === "020611"){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("main").classList.remove("hidden");
    }else{
        alert("Wrong password ❤️");
    }
}

function showMessage(text){
    document.getElementById("message").innerText = text;
}

</script>

</body>
</html>
