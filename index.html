<!DOCTYPE html>

<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Tunangku ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:url('flowers.jpg.jpg') center center/cover no-repeat;
    color:white;
    text-align:center;
    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.hidden{
    display:none;
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

.heartPage{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.bigHeart{
    font-size:100px;
    cursor:pointer;
    animation:heartbeat 1.5s infinite;
}

.text{
    margin-top:20px;
    font-size:22px;
    max-width:80%;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

#doorContainer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:999;
}

#leftDoor,
#rightDoor{
    position:absolute;
    top:0;
    width:50%;
    height:100%;
    background:#5c4033;
    transition:2s;
}

#leftDoor{
    left:-50%;
}

#rightDoor{
    right:-50%;
}

.open #leftDoor{
    transform:translateX(-100%);
}

.open #rightDoor{
    transform:translateX(100%);
}

</style>

</head>

<body>

<div class="container" id="login">

<h1>Happy Birthday Tunangku ❤️</h1>

<p>Hint: Tarikh Birthday Kamu</p>

<input type="password" id="password">

<button onclick="checkPassword()">
Buka
</button>

</div>

<div class="heartPage hidden" id="main">

<div class="bigHeart" onclick="openDoor()">
❤️
</div>

<div class="text">
Bukalah Pintu Hati Saya dan Bacalah Dengan Perlahan 🌸
</div>

</div>

<div id="doorContainer">

<div id="leftDoor"></div>
<div id="rightDoor"></div>

</div>

<script>

function checkPassword(){

    const password =
    document.getElementById("password").value;

    if(password==="020611"){

        document.getElementById("login")
        .classList.add("hidden");

        document.getElementById("main")
        .classList.remove("hidden");

    }else{

        alert("Password Salah ❤️");

    }

}

function openDoor(){

    document.getElementById("doorContainer")
    .classList.add("open");

    setTimeout(function(){

        window.location.href="birthday.html";

    },2000);

}

</script>

</body>
</html>
